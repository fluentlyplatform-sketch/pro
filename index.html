<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة التحدث بطلاقة | أهم الجمل اليومية</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4F46E5;
      --bg: #0F172A;
      --card-bg: #1E293B;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
      --accent: #38BDF8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
    body { background-color: var(--bg); color: var(--text); padding: 15px; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; }

    .container { width: 100%; max-width: 750px; margin-top: 10px; }
    header { text-align: center; margin-bottom: 20px; }
    header h1 { font-size: 1.7rem; color: #fff; margin-bottom: 6px; }
    header p { color: var(--text-muted); font-size: 0.9rem; }

    /* بطاقة مرفوض الدخول (نفس الديزاين تماماً) */
    #access-denied {
      display: none;
      background-color: #210a0e;
      border: 1px solid #7f1d1d;
      border-radius: 16px;
      padding: 30px 20px;
      text-align: center;
      margin-top: 40px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .error-title {
      color: #f87171;
      font-size: 1.8rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .error-title .badge-icon {
      background-color: #ef4444;
      color: #210a0e;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .error-desc {
      color: #f1f5f9;
      font-size: 1.1rem;
      line-height: 1.6;
      font-weight: 400;
    }

    /* أقسام وجمل المنصة */
    .tabs-wrapper { overflow-x: auto; padding-bottom: 8px; margin-bottom: 15px; }
    .tabs { display: flex; gap: 8px; min-width: max-content; background: var(--card-bg); padding: 6px; border-radius: 12px; }
    .tab-btn { padding: 8px 16px; border: none; background: transparent; color: var(--text-muted); font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; font-size: 0.9rem; }
    .tab-btn.active { background: var(--primary); color: #fff; }

    .sentences-list { display: flex; flex-direction: column; gap: 12px; }
    .sentence-card { background: var(--card-bg); border: 1px solid #334155; padding: 16px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; }
    .en-text { font-size: 1.15rem; font-weight: 700; color: var(--accent); direction: ltr; text-align: left; }
    .ar-text { font-size: 0.95rem; color: #E2E8F0; }
    
    .actions { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    
    .btn-audio {
      background: #334155; border: none; color: #fff; padding: 6px 12px; border-radius: 6px;
      cursor: pointer; font-size: 0.82rem; display: flex; align-items: center; gap: 4px; transition: 0.2s;
    }
    .btn-audio:hover { background: var(--primary); }
    .btn-normal { background: #1e293b; border: 1px solid #475569; }
    .btn-medium { background: #1e1b4b; color: #c7d2fe; border: 1px solid #312e81; }
    .btn-slow { background: #022c22; color: #99f6e4; border: 1px solid #065f46; }

    footer { text-align: center; margin-top: 30px; color: var(--text-muted); font-size: 0.8rem; }
  </style>
</head>
<body>

<div class="container">
  
  <div id="access-denied">
    <div class="error-title">
      <span>عذراً، الوصول غير متاح!</span>
      <span class="badge-icon">⛔</span>
    </div>
    <div class="error-desc">
      هذا الرابط مخصص لمشترين الحزمة اذا كنت مشتري يرجى العودة والضغط على زر 30 جمل مره أخرى.
    </div>
  </div>

  <div id="main-content" style="display: none;">
    <header>
      <h1>منصة الجمل الإنجليزية التفاعلية ✨</h1>
      <p>اختر القسم واستمِع للجمل بالسرعة المناسبة لك</p>
    </header>

    <div class="tabs-wrapper">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchCategory('restaurant')">🍽️ المطعم</button>
        <button class="tab-btn" onclick="switchCategory('social')">🤝 التعارف</button>
        <button class="tab-btn" onclick="switchCategory('hospital')">🏥 المستشفى والأدوية</button>
        <button class="tab-btn" onclick="switchCategory('travel')">✈️ السفر والمواصلات</button>
        <button class="tab-btn" onclick="switchCategory('work')">📚 العمل والدراسة</button>
        <button class="tab-btn" onclick="switchCategory('shopping')">🛍️ التسوق</button>
      </div>
    </div>

    <div id="sentences-container" class="sentences-list"></div>

    <footer>جميع الحقوق محفوظة منصة Fluently ©</footer>
  </div>

</div>

<script>
  const sentencesData = {
    restaurant: [
      { en: "A table for two, please.", ar: "طاولة لشخصين من فضلك." },
      { en: "Could we see the menu, please?", ar: "هل يمكننا رؤية قائمة الطعام من فضلك؟" },
      { en: "I'd like to order, please.", ar: "أود أن أطلب الطعام من فضلك؟" },
      { en: "Could I have the check, please?", ar: "هل يمكنني الحصول على الفاتورة من فضلك؟" },
      { en: "Everything was delicious, thank you!", ar: "كان كل شيء لذيذاً، شكراً لك!" }
    ],
    social: [
      { en: "Hi, nice to meet you!", ar: "مرحباً، سررت بلقائك!" },
      { en: "Where are you from?", ar: "من أين أنت؟" },
      { en: "What do you do for a living?", ar: "ما هو مجال عملك؟" },
      { en: "What are your hobbies?", ar: "ما هي هواياتك؟" },
      { en: "Let’s keep in touch!", ar: "دعنا نبقى على تواصل!" }
    ],
    hospital: [
      { en: "I need to see a doctor.", ar: "أحتاج لرؤية الطبيب." },
      { en: "I have a severe headache.", ar: "لدي صداع شديد." },
      { en: "Where is the nearest pharmacy?", ar: "أين تقع أقرب صيدلية؟" },
      { en: "How many times a day should I take this medication?", ar: "كم مرة في اليوم يجب أن آخذ هذا الدواء؟" },
      { en: "I'm allergic to penicillin.", ar: "لدي حساسية من البنسلين." }
    ],
    travel: [
      { en: "Where is the boarding gate?", ar: "أين بوابات الصعود إلى الطائرة؟" },
      { en: "How do I get to the city center?", ar: "كيف أصل إلى وسط المدينة؟" },
      { en: "Could you help me with my luggage?", ar: "هل يمكنك مساعدتي في أمتعتي؟" },
      { en: "Is this seat taken?", ar: "هل هذا المقعد مشغول؟" },
      { en: "I'd like to book a taxi.", ar: "أود حجز سيارة أجرة." }
    ],
    work: [
      { en: "Let’s schedule a quick meeting.", ar: "دعنا نحدد موعد اجتماع سريع." },
      { en: "Could you clarify this point?", ar: "هل يمكنك توضيح هذه النقطة؟" },
      { en: "I’m working on it right now.", ar: "أنا أعمل على ذلك الآن." },
      { en: "I’ll keep you updated on the progress.", ar: "سأبقتك على اطلاع بآخر التطورات." },
      { en: "Could you send me the report?", ar: "هل يمكنك إرسال التقرير لي؟" }
    ],
    shopping: [
      { en: "How much does this cost?", ar: "كم سعر هذا؟" },
      { en: "Do you have this in a larger size?", ar: "هل لديك هذا بمقاس أكبر؟" },
      { en: "Where are the fitting rooms?", ar: "أين تقع غرف قياس الملابس؟" },
      { en: "Do you accept credit cards?", ar: "هل تقبلون بطاقات الائتمان؟" },
      { en: "Can I get a discount on this?", ar: "هل يمكنني الحصول على خصم على هذا؟" }
    ]
  };

  // نظام حماية الأجهزة والأشخاص
  function checkSecurity() {
    const urlParams = new URLSearchParams(window.location.search);
    const access = urlParams.get('access');

    // 1. إذا كان الرابط يفتقر لتوكين الدخول
    if (!access) {
      showDenied();
      return;
    }

    try {
      // فك التشفير والتأكد أنه كود شرعي قادم من التليجرام
      const decoded = atob(access);
      if (!decoded.includes('_fluently_access')) {
        showDenied();
        return;
      }

      // إذا مر الشق الأول بنجاح، يُفتح المحتوى فوراً للمشترك
      document.getElementById('main-content').style.display = 'block';
      renderSentences('restaurant');

    } catch(e) {
      showDenied();
    }
  }

  function showDenied() {
    document.getElementById('access-denied').style.display = 'block';
    document.getElementById('main-content').style.display = 'none';
  }

  function renderSentences(category) {
    const container = document.getElementById('sentences-container');
    container.innerHTML = '';

    sentencesData[category].forEach(item => {
      const card = document.createElement('div');
      card.className = 'sentence-card';
      card.innerHTML = `
        <div class="en-text">${item.en}</div>
        <div class="ar-text">${item.ar}</div>
        <div class="actions">
          <button class="btn-audio btn-normal" onclick="speak('${escapeQuote(item.en)}', 1.0)">⚡ عادي</button>
          <button class="btn-audio btn-medium" onclick="speak('${escapeQuote(item.en)}', 0.8)">🎧 متوسط</button>
          <button class="btn-audio btn-slow" onclick="speak('${escapeQuote(item.en)}', 0.6)">🐢 بطيء</button>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function switchCategory(cat) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderSentences(cat);
  }

  function speak(text, rate) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = rate;
    window.speechSynthesis.speak(utterance);
  }

  function escapeQuote(str) { return str.replace(/'/g, "\\'"); }

  window.onload = checkSecurity;
</script>

</body>
</html>
