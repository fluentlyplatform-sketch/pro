<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة التحدث بطلاقة | أهم الجمل اليومية</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="icon" href="f-logo.png">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');


:root {
  --primary: #6366f1;
  --primary-hover: #4f46e5;
  --primary-glow: rgba(99, 102, 241, 0.4);
  --accent: #38bdf8;
  --accent-green: #10b981;
  --bg-gradient: linear-gradient(-45deg, #0f172a, #1e1b4b, #0284c7, #0f172a);
  --card-bg: rgba(30, 41, 59, 0.7);
  --card-border: rgba(255, 255, 255, 0.08);
  --text: #f8fafc;
  --text-muted: #94a3b8;
  --danger: #ef4444;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Tajawal', sans-serif;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: var(--bg-gradient);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  color: var(--text);
  padding: 15px;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  width: 100%;
  max-width: 750px;
  margin-top: 10px;
}

header {
  text-align: center;
  margin-bottom: 25px;
}

header h1 {
  font-size: 1.8rem;
  font-weight: 800;
  background: linear-gradient(to right, #ffffff, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
}

header p {
  color: var(--text-muted);
  font-size: 0.95rem;
}

/* واجهة إدخال الرمز الزجاجية */
#passcode-screen {
  background: var(--card-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--card-border);
  border-radius: 24px;
  padding: 40px 24px;
  text-align: center;
  margin-top: 30px;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
  animation: fadeIn 0.5s ease-in-out;
}

.pass-title {
  font-size: 1.5rem;
  font-weight: 800;
  margin-bottom: 8px;
  color: #fff;
}

.pass-desc {
  color: var(--text-muted);
  font-size: 0.95rem;
  margin-bottom: 25px;
}

.pass-input {
  width: 180px;
  padding: 14px;
  font-size: 2rem;
  text-align: center;
  letter-spacing: 6px;
  border-radius: 16px;
  border: 2px solid rgba(255, 255, 255, 0.1);
  background: rgba(15, 23, 42, 0.8);
  color: #fff;
  outline: none;
  font-weight: bold;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.4);
}

.pass-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 20px var(--primary-glow), inset 0 2px 4px rgba(0, 0, 0, 0.4);
}

.shake {
  animation: shakeAnim 0.4s ease-in-out;
  border-color: var(--danger) !important;
  box-shadow: 0 0 25px rgba(239, 68, 68, 0.5) !important;
}

@keyframes shakeAnim {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-10px); }
  40%, 80% { transform: translateX(10px); }
}

.btn-verify {
  display: block;
  width: 100%;
  max-width: 220px;
  margin: 25px auto 0;
  padding: 14px;
  background: linear-gradient(135deg, var(--primary), var(--primary-hover));
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 8px 20px var(--primary-glow);
}

.btn-verify:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 25px var(--primary-glow);
}

.error-msg {
  color: #fca5a5;
  font-size: 0.9rem;
  margin-top: 15px;
  display: none;
  font-weight: 500;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

#main-content {
  position: relative;
  animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* أزرار الصوت فوق اليسار مع الشارة الجديدة */
.voice-selector-container {
  position: absolute;
  top: 0;
  left: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 100;
  background: rgba(15, 23, 42, 0.7);
  backdrop-filter: blur(12px);
  padding: 10px;
  border-radius: 16px;
  border: 1px solid var(--card-border);
}

.gender-toggle {
  display: flex;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 12px;
  padding: 3px;
}

.voice-btn {
  border: none;
  background: transparent;
  padding: 6px 14px;
  font-size: 0.85rem;
  border-radius: 9px;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.25s ease;
  font-weight: 600;
}

.voice-btn.active {
  background: var(--primary);
  color: white;
  box-shadow: 0 4px 12px var(--primary-glow);
}


.variant-wrapper {
  display: flex;
  gap: 6px;
}

.variant-btn {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  padding: 6px 10px;
  font-size: 0.75rem;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.2s ease;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 4px;
}

.variant-btn.best {
  border-color: var(--accent);
  color: #fff;
}


.variant-btn:hover {
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
}

/* إصلاح التمرير والسكرول للأقسام بشكل أملس ومضمون */
.tabs-wrapper {
  overflow-x: auto;
  overflow-y: hidden;
  padding-bottom: 12px;
  margin-bottom: 20px;
  white-space: nowrap;
  -webkit-overflow-scrolling: touch; /* دعم سلس لأجهزة iOS / iPhone */
  touch-action: pan-x;
}

/* تخصيص السكرول بار ليصبح أنيقاً وغير مختفي */
.tabs-wrapper::-webkit-scrollbar {
  height: 6px;
}

.tabs-wrapper::-webkit-scrollbar-track {
  background: rgba(15, 23, 42, 0.4);
  border-radius: 10px;
}

.tabs-wrapper::-webkit-scrollbar-thumb {
  background: var(--primary);
  border-radius: 10px;
  box-shadow: 0 0 8px var(--primary-glow);
}

.tabs {
  display: inline-flex;
  gap: 8px;
  background: rgba(15, 23, 42, 0.5);
  backdrop-filter: blur(10px);
  padding: 6px;
  border-radius: 16px;
  border: 1px solid var(--card-border);
}

.tab-btn {
  padding: 10px 18px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-weight: 700;
  cursor: pointer;
  border-radius: 12px;
  transition: all 0.3s ease;
  font-size: 0.9rem;
  white-space: nowrap;
}

.tab-btn.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 4px 15px var(--primary-glow);
}

.sentences-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.sentence-card {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--card-border);
  padding: 20px;
  border-radius: 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: all 0.3s ease;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
}

.sentence-card:hover {
  transform: translateY(-3px);
  border-color: rgba(255, 255, 255, 0.2);
  box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
}

.en-text {
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--accent);
  direction: ltr;
  text-align: left;
  letter-spacing: 0.3px;
}

.pron-text {
  font-size: 0.95rem;
  color: #a7f3d0;
  font-weight: 600;
  margin-bottom: 2px;
}

.ar-text {
  font-size: 1rem;
  color: #e2e8f0;
  font-weight: 500;
}

.actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.btn-audio {
  border: none;
  color: #fff;
  padding: 8px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.25s ease;
}

.btn-normal {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
}

.btn-medium {
  background: rgba(99, 102, 241, 0.2);
  color: #c7d2fe;
  border: 1px solid rgba(99, 102, 241, 0.4);
}

.btn-slow {
  background: rgba(16, 185, 129, 0.15);
  color: #a7f3d0;
  border: 1px solid rgba(16, 185, 129, 0.3);
}

.btn-audio:hover {
  transform: scale(1.05);
}

footer {
  text-align: center;
  margin-top: 40px;
  margin-bottom: 20px;
  color: var(--text-muted);
  font-size: 0.85rem;
  font-weight: 500;
}

@media (max-width: 640px) {
  body {
    padding: 10px;
  }

  .voice-selector-container {
    position: relative;
    top: 0;
    left: 0;
    margin-bottom: 20px;
    width: 100%;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
  }
}


  </style>
</head>
<body>

<div class="container">
  
  <!-- واجهة إدخال الرمز -->
  <div id="passcode-screen">
    <div class="pass-title">رمز الدخول للمنصة 🔑</div>
    <div class="pass-desc">أدخل رمز الدخول الموجود في بوت التليجرام:</div>
    <input type="text" id="passcode-input" class="pass-input" placeholder="***">
    <button id="verify-btn" class="btn-verify" onclick="verifyPasscode()">دخول المنصة 🚀</button>
    <div id="error-msg" class="error-msg"> الرمز غير صحيح، يرجى كتابه الرمز الصحيح الذي في القناة.❌</div>
  </div>

  <!-- المحتوى الرئيسي (يحتوي الآن على أزرار الصوت لتبدأ مخفية معه) -->
  <div id="main-content" style="display: none;">
    
    <!-- حاوية خيارات الصوت (فوق يسار المحتوى الرئيسي) -->
    <div class="voice-selector-container">
      <div class="gender-toggle">
        <button id="btn-male" class="voice-btn active" onclick="setGender('male')">👨 رجل</button>
        <button id="btn-female" class="voice-btn" onclick="setGender('female')">👩 امرأة</button>
      </div>
      <button id="btn-voice-variant" class="variant-btn" onclick="toggleVoiceVariant()">🔄 تغيير الصوت (صوت 1)</button>
    </div>

    <header>
      <h1>منصة الجمل الإنجليزية التفاعلية ✨</h1>
      <p>اختر القسم واستمِع للجمل بالسرعة المناسبة لك</p>
    </header>

    <div class="tabs-wrapper">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchCategory('restaurant')">🍽️ المطعم</button>
        <button class="tab-btn" onclick="switchCategory('social')">🤝 التعارف</button>
        <button class="tab-btn" onclick="switchCategory('hospital')">🏥 المستشفى والأدوية</button>
        <button class="tab-btn" onclick="switchCategory('travel')">✈️ السفر والمواصلات</button>
        <button class="tab-btn" onclick="switchCategory('work')">📚 العمل والدراسة</button>
        <button class="tab-btn" onclick="switchCategory('shopping')">🛍️ التسوق</button>
      </div>
    </div>

    <div id="sentences-container" class="sentences-list"></div>

    <footer>جميع الحقوق محفوظة منصة Fluently ©</footer>
  </div>

</div>

// 🛡️ 2. منع اختصارات أدوات الفحص (Inspect Element & View Source)
document.addEventListener('keydown', function (e) {
  // F12
  if (e.key === 'F12' || e.keyCode === 123) {
    e.preventDefault();
  }
  // Ctrl+Shift+I / Cmd+Opt+I (Inspect Element)
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.keyCode === 73)) {
    e.preventDefault();
  }
  // Ctrl+Shift+J / Cmd+Opt+J (Console)
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j' || e.keyCode === 74)) {
    e.preventDefault();
  }
  // Ctrl+U (View Source Code)
  if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) {
    e.preventDefault();
  }
});


function renderSentences(category) {
  const container = document.getElementById('sentences-container');
  container.innerHTML = '';

  sentencesData[category].forEach(item => {
    const card = document.createElement('div');
    card.className = 'sentence-card';
    card.innerHTML = `
      <div class="en-text">${item.en}</div>
      <div class="pron-text">${item.pron || ''}</div>
      <div class="ar-text">${item.ar}</div>
      <div class="actions">
        <button class="btn-audio btn-normal" onclick="speak('${escapeQuote(item.en)}', 0.9)">⚡ عادي</button>
        <button class="btn-audio btn-medium" onclick="speak('${escapeQuote(item.en)}', 0.7)">🎧 متوسط</button>
        <button class="btn-audio btn-slow" onclick="speak('${escapeQuote(item.en)}', 0.5)">🐢 بطيء</button>
      </div>
    `;
    container.appendChild(card);
  });
}

function switchCategory(cat) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (window.event && window.event.target) {
    window.event.target.classList.add('active');
  }
  renderSentences(cat);
}

function speak(text, rate) {
  // إيقاف أي قراءة سابقة فوراً
  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = rate; // سرعة القراءة
  utterance.pitch = 1.0; // نبرة الصوت الطبيعية

  // اختيار أفضل صوت متاح في متصفح المستخدم للغة الإنجليزية
  const voices = window.speechSynthesis.getVoices();
  const preferredVoice = voices.find(v => 
    v.lang.startsWith('en') && (v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('Samantha') || v.name.includes('Zira'))
  ) || voices.find(v => v.lang.startsWith('en'));

  if (preferredVoice) {
    utterance.voice = preferredVoice;
  }

  window.speechSynthesis.speak(utterance);
}

// التأكد من تحميل الأصوات في المتصفح فور جاهزيتها
if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

function escapeQuote(str) { 
  return str.replace(/'/g, "\\'"); 
}


  let currentGender = 'male'; // الافتراضي رجل
let currentVariantIndex = 0; // 0 للصوت الأول، 1 للصوت الثاني
let availableVoices = [];

// جلب وتحديث الأصوات المتاحة في المتصفح
function loadVoices() {
  if (typeof speechSynthesis !== 'undefined') {
    availableVoices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  }
}

if (typeof speechSynthesis !== 'undefined') {
  loadVoices();
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
  }
}

// تغيير الجنس (رجل / امرأة)
function setGender(gender) {
  currentGender = gender;
  currentVariantIndex = 0; // إعادة الضبط للصوت الأول
  
  document.getElementById('btn-male').classList.toggle('active', gender === 'male');
  document.getElementById('btn-female').classList.toggle('active', gender === 'female');
  
  updateVariantButtonText();
}

// التبديل بين الصوت الأول والثاني لنفس الجنس
function toggleVoiceVariant() {
  currentVariantIndex = currentVariantIndex === 0 ? 1 : 0;
  updateVariantButtonText();
}

function updateVariantButtonText() {
  const btn = document.getElementById('btn-voice-variant');
  btn.innerText = `🔄 تغيير الصوت (صوت ${currentVariantIndex + 1})`;
}

// فلترة واختيار الصوت المناسب
function getSelectedVoice() {
  if (availableVoices.length === 0) loadVoices();

  // الكلمات المفتاحية للتعرف على نوع الصوت في مختلف الأجهزة والمتصفحات
  const maleKeywords = ['male', 'david', 'mark', 'george', 'james', 'guy', 'google us english'];
  const femaleKeywords = ['female', 'zira', 'samantha', 'victoria', 'karen', 'caren', 'susan', 'hazel'];

  let filteredVoices = availableVoices.filter(v => {
    const name = v.name.toLowerCase();
    if (currentGender === 'male') {
      return maleKeywords.some(key => name.includes(key)) || !femaleKeywords.some(key => name.includes(key));
    } else {
      return femaleKeywords.some(key => name.includes(key));
    }
  });

  // في حال لم يجد أصوات كافية، يعود لجميع الأصوات الإنجليزية
  if (filteredVoices.length === 0) filteredVoices = availableVoices;

  // اختيار الصوت (1 أو 2) حسب التحديد
  return filteredVoices[currentVariantIndex % filteredVoices.length] || availableVoices[0];
}

function speak(text, rate) {
  window.speechSynthesis.cancel(); // إيقاف أي صوت سابق

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = rate;
  utterance.pitch = currentGender === 'male' ? 0.95 : 1.1; // تعديل بسيط للنبرة لضمان وضوح خامة الصوت

  const selectedVoice = getSelectedVoice();
  if (selectedVoice) {
    utterance.voice = selectedVoice;
  }

  window.speechSynthesis.speak(utterance);
}

function renderSentences(category) {
  const container = document.getElementById('sentences-container');
  container.innerHTML = '';

  sentencesData[category].forEach(item => {
    const card = document.createElement('div');
    card.className = 'sentence-card';
    card.innerHTML = `
      <div class="en-text">${item.en}</div>
      <div class="pron-text">${item.pron || ''}</div>
      <div class="ar-text">${item.ar}</div>
      <div class="actions">
        <button class="btn-audio btn-normal" onclick="speak('${escapeQuote(item.en)}', 0.9)">⚡ عادي</button>
        <button class="btn-audio btn-medium" onclick="speak('${escapeQuote(item.en)}', 0.7)">🎧 متوسط</button>
        <button class="btn-audio btn-slow" onclick="speak('${escapeQuote(item.en)}', 0.5)">🐢 بطيء</button>
      </div>
    `;
    container.appendChild(card);
  });
}

function switchCategory(cat) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (window.event && window.event.target) {
    window.event.target.classList.add('active');
  }
  renderSentences(cat);
}

function escapeQuote(str) { 
  return str.replace(/'/g, "\\'"); 
}


// 🔑 المفتاح السرّي المشترك (طابق تماماً المفتاح المكتوب في البوت)
const SHARED_SECRET = "FLUENTLY_SECRET_KEY_12345";

// دالة حساب الرمز المتزامن مع السيرفر/البوت
function generateDynamicPasscode(offsetSteps = 0) {
  const timeStep = Math.floor(Date.now() / 1000 / 30) + offsetSteps; // نافذة 30 ثانية
  let hash = 0;
  const seedStr = SHARED_SECRET + "_" + timeStep;
  
  for (let i = 0; i < seedStr.length; i++) {
    hash = (hash * 31 + seedStr.charCodeAt(i)) & 0xFFFFFFFF;
  }
  
  hash = ((hash >> 16) ^ hash) * 0x45d9f3b;
  hash = ((hash >> 16) ^ hash) * 0x45d9f3b;
  hash = (hash >> 16) ^ hash;
  
  const code = Math.abs(hash) % 1000;
  return String(code).padStart(3, '0');
}

function verifyPasscode() {
  const inputElem = document.getElementById('passcode-input');
  const inputVal = inputElem.value.trim();
  const errorMsg = document.getElementById('error-msg');

  // قبول الرمز الحالي أو الرمز الذي انتهى للتو قبل لحظات لتفادي مشاكل التأخير
  const currentCode = generateDynamicPasscode(0);
  const previousCode = generateDynamicPasscode(-1);

  if (inputVal === currentCode || inputVal === previousCode) {
    document.getElementById('passcode-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';

    const voiceSelector = document.querySelector('.voice-selector-container');
    if (voiceSelector) {
      voiceSelector.style.display = 'flex';
    }

    renderSentences('restaurant');
  } else {
    errorMsg.style.display = 'block';
    inputElem.classList.add('shake');

    setTimeout(() => {
      inputElem.classList.remove('shake');
    }, 400);
  }
}


</script>
